# RBAC for the AI Agent to read pods/logs in the aegis-ops namespace
apiVersion: v1
kind: ServiceAccount
metadata:
  name: aegis-ai-agent
  namespace: aegis-ops
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aegis-ai-agent-role
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events", "services", "namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aegis-ai-agent-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aegis-ai-agent-role
subjects:
  - kind: ServiceAccount
    name: aegis-ai-agent
    namespace: aegis-ops
