# =============================================================================
# Prometheus Alertmanager Configuration
# =============================================================================
# Routes alerts to:
#   1. AI Agent Webhook (primary – for automated self-healing)
#   2. Slack/Discord (secondary – for team notification)
# =============================================================================

---
global:
  resolve_timeout: 5m
  smtp_from: "aegis-ops@alerts.dev"

# ---------------------------------------------------------------------------
# Templates
# ---------------------------------------------------------------------------
templates:
  - "/etc/alertmanager/templates/*.tmpl"

# ---------------------------------------------------------------------------
# Routes
# ---------------------------------------------------------------------------
route:
  group_by: ["alertname", "namespace", "pod"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "aegis-ai-agent"

  routes:
    # Critical alerts → immediately to AI Agent
    - match:
        severity: critical
      receiver: "aegis-ai-agent"
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # Warning alerts → AI Agent with longer wait
    - match:
        severity: warning
      receiver: "aegis-ai-agent"
      group_wait: 30s
      repeat_interval: 4h
      continue: true

    # All alerts also go to Slack for visibility
    - match_re:
        severity: "critical|warning"
      receiver: "slack-notifications"
      continue: false

# ---------------------------------------------------------------------------
# Receivers
# ---------------------------------------------------------------------------
receivers:
  # ---- Primary: AI Agent Webhook ----
  - name: "aegis-ai-agent"
    webhook_configs:
      - url: "http://aegis-ai-agent.aegis-ops.svc.cluster.local:5000/webhook/alertmanager"
        send_resolved: true
        max_alerts: 10
        http_config:
          basic_auth:
            username: "alertmanager"
            password_file: "/etc/alertmanager/secrets/webhook-password"

  # ---- Secondary: Slack Notifications ----
  - name: "slack-notifications"
    slack_configs:
      - api_url: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"
        channel: "#aegis-ops-alerts"
        send_resolved: true
        title: '{{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
        text: >-
          *Alert:* {{ .CommonLabels.alertname }}
          *Severity:* {{ .CommonLabels.severity }}
          *Namespace:* {{ .CommonLabels.namespace }}
          *Pod:* {{ .CommonLabels.pod }}
          *Description:* {{ .CommonAnnotations.description }}
        color: '{{ if eq .CommonLabels.severity "critical" }}danger{{ else }}warning{{ end }}'

# ---------------------------------------------------------------------------
# Inhibition Rules (suppress lower-severity alerts when critical fires)
# ---------------------------------------------------------------------------
inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname", "namespace"]
