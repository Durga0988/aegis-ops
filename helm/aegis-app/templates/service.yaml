apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.fullnameOverride | default (include "aegis-app.fullname" .) }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: aegis-app
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    app: aegis-app
    app.kubernetes.io/instance: {{ .Release.Name }}